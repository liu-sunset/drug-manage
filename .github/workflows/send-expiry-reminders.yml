name: 药物过期邮件提醒

on:
  schedule:
    # 北京时间 9:20 = UTC 1:20
    - cron: "20 1 * * *"
  workflow_dispatch: {}

jobs:
  trigger-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 调用 Supabase Edge Function
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/send-expiry-reminders")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP 状态码: $HTTP_CODE"
          echo "响应内容: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Edge Function 返回非 200 状态码: $HTTP_CODE"
            exit 1
          fi

          SENT=$(echo "$BODY" | jq -r '.sent // 0')
          FAILED=$(echo "$BODY" | jq -r '.failed // 0')
          PROCESSED=$(echo "$BODY" | jq -r '.processed // 0')
          ERRORS=$(echo "$BODY" | jq -r '.errors // []')

          echo "处理: $PROCESSED, 发送成功: $SENT, 失败: $FAILED"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::${FAILED} 封邮件发送失败"
            echo "错误详情: $ERRORS"
          fi

          echo "邮件提醒任务执行完成"
